<div class="detail-section">
  <div class="container-fluid">

    <div *ngIf="errorMsg" class="alert alert-danger">
      {{ errorMsg }}
    </div>

    <ng-container *ngIf="product$ | async as p; else loading">
      <img [src]="imageSrc(p?.imageUrl)" class="detail-img" width="350" height="50">

      <h3>{{ p?.name }}</h3>
      <div class="price">{{ p?.unitPrice | currency:'USD' }}</div>

      <a href="#" class="primary-btn btn-fixed">Add to cart</a>

       <!-- <button (click)="addToCart()" class="btn btn-primary btn-sm">Add to cart</button> -->
      <hr>
      <h4>Description</h4>
      <p>{{ p?.description }}</p>

      <a routerLink="/products" class="mt-5">Back to Product List</a>
    </ng-container>

    <ng-template #loading>
      <p>Loading...</p>
    </ng-template>

  </div>
</div>
