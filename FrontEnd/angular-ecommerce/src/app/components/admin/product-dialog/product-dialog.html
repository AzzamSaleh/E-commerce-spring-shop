<h2 mat-dialog-title>
  {{ mode === 'edit' ? 'Edit Product' : 'Add Product' }}
</h2>

<mat-dialog-content [formGroup]="form" style="display:grid; gap:12px; padding-top:10px;">

  <mat-form-field appearance="outline">
    <mat-label>Category</mat-label>
    <mat-select formControlName="categoryId">
      <mat-option *ngFor="let c of categories" [value]="c.id">
        {{c.categoryName}}
      </mat-option>
    </mat-select>
    <mat-error *ngIf="form.get('categoryId')?.invalid">
      Category required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Name</mat-label>
    <input matInput formControlName="name">
    <mat-error *ngIf="form.get('name')?.invalid">
      Name required (min 2 chars)
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Price</mat-label>
    <input matInput type="number" formControlName="unitPrice">
    <mat-error *ngIf="form.get('unitPrice')?.invalid">
      Price must be greater than 0
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Stock</mat-label>
    <input matInput type="number" formControlName="unitsInStock">
    <mat-error *ngIf="form.get('unitsInStock')?.invalid">
      Stock must be 0 or more
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Image URL</mat-label>
    <input matInput formControlName="imageUrl">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Description</mat-label>
    <textarea matInput rows="3" formControlName="description"></textarea>
  </mat-form-field>

<mat-form-field appearance="outline">
  <mat-label>SKU</mat-label>
  <input matInput formControlName="sku">
  <mat-error *ngIf="form.get('sku')?.hasError('required')">SKU required</mat-error>
  <mat-error *ngIf="form.get('sku')?.hasError('pattern')">Only letters/numbers/_/-</mat-error>
</mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
